<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — Свои Дни</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: var(--navy);
            line-height: 1;
            margin-bottom: 20px;
            opacity: 0.1;
        }
        .error-content {
            margin-top: -60px;
        }
        .btn-home {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--navy);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-content">
            <h1 style="color: var(--navy);">Упс! Страница потерялась</h1>
            <p style="color: #666; max-width: 400px; margin: 20px auto;">
                Похоже, адрес введен неверно или страница была перемещена. 
                Но не переживайте, наша квартира в Санкт-Петербурге на месте!
            </p>
            <a href="https://своидни.рф" class="btn-home">Вернуться на главную</a>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
