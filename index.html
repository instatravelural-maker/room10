<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svoi Dni | Premium Living</title>
    <style>
        :root {
            --bg-dark: #020617;
            --primary-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: var(--bg-dark);
            /* Анимированный градиент на фоне */
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(30, 58, 138, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(15, 23, 42, 0.5) 0%, transparent 40%);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; flex-grow: 1; }

        /* Обложка с эффектом глубины */
        .hero {
            height: 350px;
            border-radius: 32px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            background: url('hero.jpg') center/cover;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: flex-end;
            padding: 40px;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(2, 6, 23, 0.9) 100%);
        }

        .hero-content { position: relative; z-index: 2; }
        .logo-img { width: 70px; height: 70px; border-radius: 18px; margin-bottom: 15px; border: 1px solid var(--glass-border); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .hero h1 { font-size: 2.8rem; margin: 0; font-weight: 800; letter-spacing: -2px; line-height: 1; }

        /* Кнопка бронирования с неоновым эффектом */
        .booking-card {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            padding: 24px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 30px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-weight: 700;
            font-size: 1.3rem;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 25px var(--accent-glow);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .booking-card:hover { transform: scale(1.01) translateY(-2px); box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); }

        /* Bento Grid Layout */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: minmax(180px, auto);
            gap: 20px;
        }

        .item {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            transition: 0.3s ease;
        }
        .item:hover { background: rgba(30, 41, 59, 0.6); border-color: rgba(255,255,255,0.2); }

        .wide { grid-column: span 2; }
        .tall { grid-row: span 2; }

        h2 { font-size: 1rem; color: var(--primary-blue); text-transform: uppercase; letter-spacing: 2px; margin: 0 0 20px 0; font-weight: 700; }
        p { color: var(--text-dim); line-height: 1.6; margin: 0; }

        /* Внутренние элементы */
        .media { width: 100%; border-radius: 20px; object-fit: cover; border: 1px solid var(--glass-border); }
        
        .code-display {
            background: rgba(0,0,0,0.3);
            border-radius: 18px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        .code-val { font-size: 1.5rem; font-family: 'Monaco', monospace; font-weight: 600; color: white; }
        .btn-copy { 
            background: var(--primary-blue); color: white; border: none; 
            padding: 8px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.8rem;
            transition: 0.2s;
        }
        .btn-copy:active { transform: scale(0.9); }

        /* Правила в стиле Apple */
        .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .rule-tag { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--glass-border); }

        footer { padding: 60px 0; text-align: center; border-top: 1px solid var(--glass-border); margin-top: 40px; }
        .footer-nav { margin-bottom: 20px; }
        .footer-nav a { color: var(--text-dim); text-decoration: none; margin: 0 15px; font-weight: 500; transition: 0.2s; }
        .footer-nav a:hover { color: white; }

        @media (max-width: 850px) {
            .bento-grid { grid-template-columns: 1fr; }
            .wide, .tall { grid-column: span 1; grid-row: span 1; }
            .hero { height: 280px; padding: 25px; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <div class="hero-content">
            <img src="logo.png" class="logo-img" alt="Logo">
            <p style="color: var(--primary-blue); font-weight: 700; margin-bottom: 10px;">WELCOME TO SVOI DNI</p>
            <h1>Премиальный<br>комфорт</h1>
        </div>
    </div>

    <a href="https://homereserve.ru/AeEVhV7jVU" class="booking-card">
        Забронировать проживание <span>→</span>
    </a>
