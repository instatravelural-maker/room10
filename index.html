<style>
    :root {
        /* Цвета стали более насыщенными */
        --primary: #1e3a8a; 
        --accent: #d97706;
        /* Фон: глубокий серо-голубой градиент */
        --bg: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
        --card-bg: #ffffff;
        --text: #0f172a;
    }

    body { 
        font-family: 'Segoe UI', system-ui, sans-serif; 
        background: var(--bg); /* Применяем градиент */
        background-attachment: fixed; /* Фон не движется при скролле - это выглядит круто */
        margin: 0; 
        padding: 0; 
        color: var(--text); 
        padding-bottom: 40px; 
    }

    .main-container { max-width: 900px; margin: 0 auto; padding: 0 15px; }

    /* Шапка */
    .header-hero {
        position: relative;
        background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('hero.jpg');
        background-size: cover;
        background-position: center;
        height: 280px; 
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
        margin-bottom: 30px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }
    
    .logo-hero { 
        max-width: 110px; 
        border-radius: 50%; 
        border: 4px solid rgba(255,255,255,0.8);
        box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        background: white;
        margin-bottom: 15px;
    }

    /* Карточки с эффектом объема */
    .card { 
        background: var(--card-bg); 
        padding: 25px; 
        border-radius: 24px; /* Более скругленные углы выглядят современнее */
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -2px rgba(0,0,0,0.05); 
        display: flex;
        flex-direction: column;
        border: 1px solid rgba(255,255,255,0.7); /* Тонкая светлая каемка */
    }

    .booking-btn {
        display: block; 
        background: var(--primary); 
        color: white !important; 
        text-align: center; 
        padding: 20px; 
        border-radius: 20px; 
        text-decoration: none; 
        font-weight: 800; 
        font-size: 1.2rem;
        margin-bottom: 35px;
        transition: all 0.3s ease;
        box-shadow: 0 10px 20px rgba(30, 58, 138, 0.3);
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .booking-btn:hover { 
        transform: translateY(-3px); 
        box-shadow: 0 15px 25px rgba(30, 58, 138, 0.4);
    }

    h2 { 
        font-size: 1.2rem; 
        margin-top: 0; 
        color: var(--primary); 
        border-bottom: 2px solid #f1f5f9; 
        padding-bottom: 12px; 
        margin-bottom: 20px;
    }

    /* Улучшенные блоки данных */
    .data-row { 
        background: #f8fafc; 
        border: 1px solid #e2e8f0; 
        padding: 15px; 
        border-radius: 16px; 
        margin-bottom: 12px; 
    }

    /* Адаптивность */
    @media (max-width: 768px) {
        .header-hero { height: 220px; }
        .grid-layout { gap: 15px; }
    }
</style>
